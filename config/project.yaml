deployment:
  mode: laptop_offload
gateway:
  transport: local_tcp
  port: 8765
  local_host: 127.0.0.1
ngrok:
  enabled: false
  authtoken_env: NGROK_AUTHTOKEN
  reserved_tcp_addr: ''
  use_ephemeral_tcp: true
inference:
  backend: auto
  device: auto
vision:
  source: astra
  input_topic: /camera_top/rgb/image_raw
  emotion_topic: /camera/emotion
  uvc_device: /dev/video0
  astra_bridge_cmd: source /opt/ros/melodic/setup.bash && source /home/mustar/catkin_ws/devel/setup.bash && roslaunch rchomeedu_vision multi_astra.launch
audio:
  input_topic: /audio/raw
  emotion_topic: /audio/emotion
  sample_rate_hz: 16000
  chunk_bytes: 4096
stt:
  enabled: true
  backend: mock
  language: en-US
  transcript_topic: /speech/text
tts:
  enabled: true
  backend: mock
  voice: default
  output_topic: /robot/say
